name: Release Backfill

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish and notify
        required: true
        default: v0.35.0

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Read package metadata
        id: package
        env:
          TAG: ${{ inputs.tag }}
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          if [ "v$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package version $VERSION" >&2
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm publication
        id: npm
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm authentication
        if: ${{ steps.npm.outputs.published != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - run: bun run build
        if: ${{ steps.npm.outputs.published != 'true' }}

      - run: npm publish
        if: ${{ steps.npm.outputs.published != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read GitHub release body
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release view "$TAG" --json body -q .body > release-body.md

      - name: Notify changelog to Discord
        env:
          WINDMILL_TOKEN: ${{ secrets.WINDMILL_TOKEN }}
        run: |
          BODY="$(jq -Rs '{changelog_body: .}' release-body.md)"
          curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $WINDMILL_TOKEN" \
            -d "$BODY" \
            'https://app.windmill.dev/api/w/windmill-labs/jobs/run/p/f/all/forward-webmux-changelog-discord'
